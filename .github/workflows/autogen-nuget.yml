name: AutoGen & NuGet Publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true 
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate P/Invoke code
        run: powershell -ExecutionPolicy Bypass -File .\generation\generate.ps1

      - name: Build
        run: dotnet build --configuration Release

      - name: List generated nupkg files
        run: Get-ChildItem -Path ".\nupkgs\" -Filter "*.nupkg" -Recurse

      - name: Publish NuGet
        run: |
          $nupkgs = Get-ChildItem -Path ".\nupkgs\" -Filter "*.nupkg" -Recurse
          foreach ($nupkg in $nupkgs) {
            dotnet nuget push $nupkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
